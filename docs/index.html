<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate4.tools — Fate Core Character Sheet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css">
    <script>
    // Apply saved theme immediately to avoid flash of wrong theme
    (function() {
        try {
            var saved = localStorage.getItem("fate4_theme");
            if (saved) {
                document.documentElement.setAttribute("data-theme", saved);
            } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
                document.documentElement.setAttribute("data-theme", "light");
            }
        } catch (e) {}
    })();
    </script>
</head>
<body>
    <div id="loading">
        <h1>Fate 4 Core Tools</h1>
        <p>Loading…</p>
    </div>
    <div id="app" style="display: none;">
        <header id="header">
            <h1>Fate4.tools</h1>
            <div id="header-actions">
                <button id="split-btn" class="btn btn-small">Split View</button>
                <button id="print-btn" class="btn btn-small" style="display:none;">Print</button>
                <button id="export-btn" class="btn btn-small" style="display:none;">Export JSON</button>
                <button id="share-btn" class="btn btn-small" style="display:none;">Share Link</button>
                <button id="delete-btn" class="btn btn-small btn-danger" style="display:none;">Delete</button>
                <button id="import-btn" class="btn btn-small">Import JSON</button>
                <button id="theme-toggle" title="Toggle dark mode">Dark</button>
            </div>
        </header>
        <nav id="tab-bar" role="tablist" aria-label="Character tabs">
            <button id="new-tab-btn" title="New Character" aria-label="Create new character">+</button>
        </nav>
        <div id="split-container" style="display:none;">
            <div id="split-left" class="split-pane"></div>
            <div id="split-right" class="split-pane"></div>
        </div>
        <main id="content"></main>
        <footer id="site-footer">
            <a href="https://github.com/nulvox/fate4.tools" target="_blank" rel="noopener">GitHub</a>
            <span>MIT License</span>
        </footer>
    </div>

    <footer id="loading-footer">
        <a href="https://github.com/nulvox/fate4.tools" target="_blank" rel="noopener">GitHub</a>
        <span>MIT License</span>
    </footer>

    <script src="wasm_exec.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/character-ui.js"></script>
    <script src="js/import-export.js"></script>
    <script src="js/share.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
